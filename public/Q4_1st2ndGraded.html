<html>
  <head>
    <Title>Movie Rating</Title>
    <link rel="stylesheet" href="../assets/styles/styleindex.css"> 
  </head>

  <body>
    <h1>Movie Rating</h1>
    
    <div id="enclosure1">
      <h1>Add a Movie------------------------------------</h1>
      <form>
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" required><br><br>
        <label for="year">Year:</label>
        <input type="number" id="year" name="year" required><br><br>
        <label for="genre">Genre:</label>
        <select id="genre" name="genre" required>
          <option value="Action">Action</option>
          <option value="Comedy">Comedy</option>
          <option value="Drama">Drama</option>
          <option value="Horror">Horror</option>
          <option value="Sci-Fi">Sci-Fi</option>
        </select><br><br>
        <label for="stars">Rating:</label>
        <fieldset id="stars" class="starfield" onclick="starcolor()">
          <input class="star" type="radio" id="1s" name="rating" value=1 required>
          <input class="star" type="radio" id="2s" name="rating" value=2>
          <input class="star" type="radio" id="3s" name="rating" value=3>
          <input class="star" type="radio" id="4s" name="rating" value=4>
          <input class="star" type="radio" id="5s" name="rating" value=5>
        </fieldset><br><br>
        <input type="button" value="Add Movie" onclick="updateMovies()">
      </form>
        
    </div><br><br>

    <table id="movieratings" class="reviewtable">
      <thead>
        <tr>
          <th>Title</th>
          <th>Year</th>
          <th>Genre</th>
          <th>Rating</th> 
        </tr>
      </thead>
      <tbody>

      </tbody>
    </table>

    <button><a href="../index.html">Home</a></button>
  <script>
    existing = JSON.parse(localStorage.getItem("movies") || "[]");
    updateTable();


    function starcolor() {
      const stars = document.getElementsByName("rating");
      for (let i=0; i<stars.length; i++) {
        if (stars[i].checked) {
          for (let j=i; j>=0; j--) {
            stars[j].style.backgroundColor = "yellow";
          }
        }
      }
    }

    function updateMovies() {
      const title = document.getElementById("title").value;
      const year = document.getElementById("year").value;
      const genre = document.getElementById("genre").value;
      const rating = document.querySelector('input[name="rating"]:checked').value;

      if (confirm("Add your movie rating?")) {
        const review = {
          title: title,
          year: year,
          genre: genre,
          rating: rating
        }

        existing.push(review);
        localStorage.setItem("movies", JSON.stringify(existing));
        
        updateTable();
      }
    }

    function updateTable() {
      const table = document.getElementById("movieratings").getElementsByTagName("tbody")[0];
      table.innerHTML = "";

      for (let i=0; i<existing.length; i++) {
        const row = table.insertRow();
        let keys = Object.keys(existing[i]);
        for (let j=0; j<keys.length-1; j++) { 
          const cell = row.insertCell();
          cell.innerHTML = existing[i][keys[j]];
        } 
        const cell = row.insertCell();
        cell.style.color = "yellow";
        let stars = "";
        for (let k=0; k<existing[i].rating; k++) {
          stars += "&#9733;";
        }
        cell.innerHTML = stars;
      }
    }

  </script>
  </body>

</html>
