<html>
  <head>
    <Title>Movie Rating</Title>
    <link rel="stylesheet" href="../assets/styles/styleindex.css"> 
  </head>

  <body>
    <h1>Q4 1st/2nd Graded Activity: Movie Rating</h1>
    
    <div id="enclosure1">
      <h1>Add a Movie------------------------------------</h1>
      <form id="mform" method="post">
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" required><br><br>
        <label for="year">Year:</label>
        <input type="number" id="year" name="year" required><br><br>
        <label for="genre">Genre:</label>
        <select id="genre" name="genre" required>
          <option value="" disabled selected>Genre</option>
          <option value="Action">Action</option>
          <option value="Comedy">Comedy</option>
          <option value="Drama">Drama</option>
          <option value="Horror">Horror</option>
          <option value="Sci-Fi">Sci-Fi</option>
        </select><br><br>
        <label for="stars">Rating:</label>
        <fieldset id="stars" class="starfield" onclick="starColor()">
          <label for="1s" class="star">&#9733;</label>
          <input class="rstar" type="radio" id="1s" name="rating" value=1 required>
          <label for="2s" class="star">&#9733;</label>
          <input class="rstar" type="radio" id="2s" name="rating" value=2>
          <label for="3s" class="star">&#9733;</label>
          <input class="rstar" type="radio" id="3s" name="rating" value=3>
          <label for="4s" class="star">&#9733;</label>
          <input class="rstar" type="radio" id="4s" name="rating" value=4>
          <label for="5s" class="star">&#9733;</label>
          <input class="rstar" type="radio" id="5s" name="rating" value=5>
        </fieldset><br>
        <input type="submit" value="Add Movie">
      </form>
        
    </div><br><br>

    <table id="movieratings" class="reviewtable">
      <thead>
        <tr>
          <th>Title</th>
          <th>Year</th>
          <th>Genre</th>
          <th>Rating</th>
          <th>Reviews</th>
          <th>Deletion</th> 
        </tr>
      </thead>
      <tbody>

      </tbody>
    </table><br>

    <button><a href="../index.html">Home</a></button>
  <script>
    const existing = JSON.parse(localStorage.getItem("movies") || "[]");
    updateTable();

    document.addEventListener("submit", function(event) {
      event.preventDefault();
      updateMovies();
    });

    function starColor() {
      const stars = document.getElementsByClassName("star");
      const rating = document.querySelector('input[name="rating"]:checked').value;
      for (let i=0; i<stars.length; i++) {
        if (i < rating) {
          stars[i].classList.add("starclicked");
        } else {
          stars[i].classList.remove("starclicked");
        }
      }
    }

    function starHover() {
      const rstars = document.getElementsByClassName("rstar");
      const stars = document.getElementsByClassName("star");
      for (let i=0; i<stars.length; i++) {
        if (rstars[i].matches(":hover") || stars[i].matches(":hover")) {
          for (let j=0; j<=i; j++) {
            stars[j].classList.add("starclicked");
          }
        }
      }
    } // i'll figure this out eventually, can't get it to call

    function updateMovies() {
      const stars = document.getElementsByClassName("star");
      const title = document.getElementById("title").value;
      const year = document.getElementById("year").value;
      const genre = document.getElementById("genre").value;
      const rating = document.querySelector('input[name="rating"]:checked').value;

      if (confirm("Add your movie rating?")) {
        const review = {
          title: title,
          year: year,
          genre: genre,
          rating: rating,
          revs: 1
        }
        
        let etest = false;

        for (let i=0; i<existing.length; i++) {
          if (existing[i].title == title && existing[i].year == year && existing[i].genre == genre) {
            existing[i].rating = Number(existing[i].rating) * Number(existing[i].revs);
            existing[i].revs = Number(existing[i].revs) + 1;
            existing[i].rating += Number(rating);
            existing[i].rating = Number(existing[i].rating) / Number(existing[i].revs);

            etest = true;
          }
        }

        if (!etest) {
          existing.push(review);
        }
        
        localStorage.setItem("movies", JSON.stringify(existing));
        document.getElementById("mform").reset();
        
        updateTable();
        for (let i=0; i<stars.length; i++) {
          stars[i].classList.remove("starclicked");
        }
      }
    }

    function updateTable() {
      const table = document.getElementById("movieratings").getElementsByTagName("tbody")[0];
      table.innerHTML = "";

      for (let i=0; i<existing.length; i++) {
        const row = table.insertRow();
        let keys = Object.keys(existing[i]);
        for (let j=0; j<keys.length-2; j++) { 
          const cell = row.insertCell();
          cell.innerHTML = existing[i][keys[j]];
        }

        const ratecell = row.insertCell();
        ratecell.style.color = "gold";
        let stars = "";
        for (let k=0; k<Math.round(Number(existing[i].rating)); k++) {
          stars += "&#9733;";
        }
        const revcell = row.insertCell();
        revcell.innerHTML = existing[i].revs;
        ratecell.innerHTML = stars;
        ratecell.style.webkitTextStrokeColor = "#333";
        ratecell.style.webkitTextStrokeWidth = "1px";

        const delcell = row.insertCell();
        delcell.innerHTML = "Delete";
        delcell.classList.add("delbutton");
        delcell.value = i;
        delcell.onclick = function() {
          deleteMovie(this.value);
        }
      }
    }

    function deleteMovie(index) {
      if (confirm("Delete this movie rating?")) {
        existing.splice(index, 1);
        localStorage.setItem("movies", JSON.stringify(existing));
        updateTable();
      }
    }

  </script>
  </body>

</html>
